name: upload

on:
  push:
    branches: [ 672 ]

jobs:
  build:
    runs-on: ubuntu-latest

    if: github.event.repository.owner.id == github.event.sender.id

    steps:

      - name: Checkout
        uses: actions/checkout@v2
        with:
          ref: 672

      - name: Space cleanup
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi `docker images -q`
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d
          sudo -E apt-get -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell openjdk* mysql* php* android*
          sudo apt update
          sudo apt install git curl tar make libgcrypt-dev gcc srecord zip python3 gzip -y
          sudo curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR=/bin sh
          sudo curl -sSLo mklittlefs.tar.gz https://github.com/earlephilhower/mklittlefs/releases/download/3.0.0/x86_64-linux-gnu-mklittlefs-295fe9b.tar.gz && tar xfz mklittlefs.tar.gz -C /bin/ --strip-components=1 && rm mklittlefs.tar.gz
          sudo arduino-cli core install esp8266:esp8266 --additional-urls http://arduino.esp8266.com/stable/package_esp8266com_index.json 
          sudo arduino-cli core upgrade --additional-urls http://arduino.esp8266.com/stable/package_esp8266com_index.json 
          sudo arduino-cli lib upgrade --additional-urls http://arduino.esp8266.com/stable/package_esp8266com_index.json 
          sudo arduino-cli lib install SdFat --additional-urls http://arduino.esp8266.com/stable/package_esp8266com_index.json
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
      - name: build 
        run: |
          cd ../
          git clone https://github.com/zerofo/docker-8266-builder
          cp ./docker-8266-builder/config.txt /config.txt
          cp ./docker-8266-builder/mk8266.sh /mk8266.sh
          cp ./zerofo.github.io /mk8266 -rf
          cp ./docker-8266-builder/Ps4-wifi-http /Ps4-wifi-http -rf
          mkdir -p /output
          bash /mk8266.sh
      - name: Deliver package
        uses: actions/upload-artifact@v2
        with:
          name: 8266_bin
          path: /output
